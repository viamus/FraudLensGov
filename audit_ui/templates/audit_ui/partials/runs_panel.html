<article class="panel">
  <div class="panel-head">
    <div class="head-title">
      <svg><use href="#i-database"></use></svg>
      <div>
        <p class="eyebrow">Ingestão</p>
        <h2>Execuções recentes</h2>
      </div>
    </div>
  </div>
  <div class="table-scroll">
    <div class="data-table runs-table" role="table" aria-label="Execuções recentes">
      <div class="table-row table-head-row" role="row">
        <span>Fonte</span>
        <span>Status</span>
        <span>Lidos</span>
        <span>Gravados</span>
      </div>
      {% for run in ingestion_runs %}
        <div class="table-row" role="row">
          <strong>{{ run.source }}</strong>
          <span class="badge {{ run.status_tone }}">{{ run.status }}</span>
          <span>{{ run.records_read }}</span>
          <span>{{ run.records_written }}</span>
        </div>
      {% empty %}
        <div class="empty-state">Sem ingestões registradas.</div>
      {% endfor %}
    </div>
  </div>
</article>
