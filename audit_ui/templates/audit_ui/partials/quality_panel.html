<article class="panel">
  <div class="panel-head">
    <div class="head-title">
      <svg><use href="#i-database"></use></svg>
      <div>
        <p class="eyebrow">Qualidade</p>
        <h2>Bloqueios Golden</h2>
      </div>
    </div>
  </div>
  <p class="panel-context">
    Motivos que impedem benchmark confiável no Golden.
  </p>
  <div class="table-scroll">
    <div class="data-table quality-table" role="table" aria-label="Qualidade da base">
      <div class="table-row table-head-row" role="row">
        <span>Grupo</span>
        <span>Motivo</span>
        <span>Registros</span>
      </div>
      {% for item in quality %}
        <div class="table-row {{ item.tone }}" role="row">
          <strong>{{ item.label }}</strong>
          <span>{{ item.detail }}</span>
          <strong class="numeric">{{ item.value }}</strong>
        </div>
      {% endfor %}
    </div>
  </div>
</article>
