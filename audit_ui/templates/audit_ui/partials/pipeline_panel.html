<article class="panel panel-major">
  <div class="panel-head">
    <div class="head-title">
      <svg><use href="#i-layers"></use></svg>
      <div>
        <p class="eyebrow">Pipeline</p>
        <h2>Bronze / Silver / Golden</h2>
      </div>
    </div>
    <a class="button secondary" href="/api/pipeline"><svg><use href="#i-code"></use></svg><span>API</span></a>
  </div>
  <p class="panel-context">
    Do bruto ao auditável: Bronze coleta, Silver normaliza, Golden compara ou bloqueia.
  </p>
  <div class="summary-strip">
    {% for layer in layers %}
      <div>
        <span>{{ layer.name }}</span>
        <strong>{{ layer.value }}</strong>
        <small>{{ layer.meta }}</small>
      </div>
    {% endfor %}
  </div>
</article>
